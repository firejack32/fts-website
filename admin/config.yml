backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "Company Info & Home Page"
        file: "_data/site.json"
        fields:
          # ── Company Info ──
          - label: "Company Info"
            name: "company"
            widget: "object"
            fields:
              - { label: "Company Name", name: "name", widget: "string" }
              - { label: "Email Address", name: "email", widget: "string" }
              - { label: "Phone Number", name: "phone", widget: "string" }
              - { label: "After Hours Phone", name: "afterHoursPhone", widget: "string" }
              - { label: "Service Request Email", name: "serviceRequestEmail", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }

          # ── Home Page ──
          - label: "Home Page"
            name: "homepage"
            widget: "object"
            fields:
              # Slider
              - label: "Hero Slides"
                name: "slides"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
                  - { label: "Button Text", name: "buttonText", widget: "string" }
                  - { label: "Button Link", name: "buttonLink", widget: "string" }
                  - { label: "Background Image", name: "backgroundImage", widget: "image" }

              # About box
              - label: "About Section"
                name: "aboutSection"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Subtext", name: "subtext", widget: "string" }

              # Services
              - { label: "Services Heading", name: "servicesHeading", widget: "string" }
              - { label: "Services Subtext", name: "servicesSubtext", widget: "string" }
              - label: "Services List"
                name: "services"
                widget: "list"
                fields:
                  - { label: "Service Name", name: "name", widget: "string" }
                  - { label: "Brands", name: "brands", widget: "string" }

              # Banner
              - { label: "Banner Text", name: "bannerText", widget: "string" }

              # Stats
              - label: "Stats Counters"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Number", name: "number", widget: "number" }
                  - { label: "Label", name: "label", widget: "string" }

              # Quote section
              - label: "Quote Section"
                name: "quoteSection"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
